<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charts Explorer - Solar Monitor</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3498db">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/icon.svg">
    <script src="/js/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333333;
            --header-text: #2c3e50;
            --card-shadow: rgba(0,0,0,0.1);
            --accent-color: #3498db;
            --border-color: #dddddd;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --header-text: #ffffff;
            --card-shadow: rgba(0,0,0,0.3);
            --border-color: #444444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 { margin: 0; color: var(--header-text); font-size: 1.5rem; }

        .btn {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--container-bg);
            color: var(--text-color);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9em;
        }
        .btn:hover { background: var(--border-color); }

        .controls-card {
            background: var(--container-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 4px var(--card-shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-size: 0.85rem; color: var(--header-text); font-weight: 600; }
        select, input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
        }

        select[multiple] {
            height: 100px;
        }

        .chart-card {
            background: var(--container-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 4px var(--card-shadow);
            border: 1px solid var(--border-color);
            min-height: 450px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .chart-wrapper {
            flex-grow: 1;
            position: relative;
            min-height: 400px;
        }

        #loadingOverlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            opacity: 0.7;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 8px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .controls-card { padding: 15px; }
            .chart-card { padding: 10px; min-height: 350px; }
            .chart-wrapper { min-height: 300px; }
            h1 { font-size: 1.2rem; }
            .controls-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center; gap: 10px;">
                <a href="/" class="btn" title="Back to Dashboard">🏠</a>
                <h1>Charts Explorer</h1>
            </div>
            <button id="themeToggle" class="btn" title="Toggle theme">🌙</button>
        </header>

        <div class="controls-card">
            <div class="controls-grid">
                <div class="form-group">
                    <label for="metricSelect">Metrics (Ctrl+Click)</label>
                    <select id="metricSelect" multiple></select>
                </div>
                <div class="form-group">
                    <label for="typeSelect">Chart Type</label>
                    <select id="typeSelect">
                        <option value="line">Line</option>
                        <option value="bar">Bar</option>
                        <option value="area">Area</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="startInput">Start Time</label>
                    <input type="datetime-local" id="startInput">
                </div>
                <div class="form-group">
                    <label for="endInput">End Time</label>
                    <input type="datetime-local" id="endInput">
                </div>
            </div>
            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end;">
                 <button id="refreshBtn" class="btn" style="background: var(--accent-color); color: white; border: none; font-weight: bold;">Update Chart</button>
            </div>
        </div>

        <div class="chart-card">
            <div id="loadingOverlay">
                <div class="spinner"></div>
            </div>
            <div class="chart-wrapper">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const metricSelect = document.getElementById('metricSelect');
        const typeSelect = document.getElementById('typeSelect');
        const startInput = document.getElementById('startInput');
        const endInput = document.getElementById('endInput');
        const refreshBtn = document.getElementById('refreshBtn');
        const themeToggle = document.getElementById('themeToggle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        let chartInstance = null;

        // Theme management
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            updateChartTheme();
        }
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(savedTheme);

        function updateChartTheme() {
            if (!chartInstance) return;
            const color = getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim();
            chartInstance.options.scales.y.ticks.color = color;
            if (chartInstance.options.scales.y.title) chartInstance.options.scales.y.title.color = color;
            if (chartInstance.options.scales.y1) {
                chartInstance.options.scales.y1.ticks.color = color;
                if (chartInstance.options.scales.y1.title) chartInstance.options.scales.y1.title.color = color;
            }
            chartInstance.options.scales.x.ticks.color = color;
            if (chartInstance.options.plugins.legend) {
                chartInstance.options.plugins.legend.labels.color = color;
            }
            chartInstance.update();
        }

        function getSelectedMetrics() {
            return Array.from(metricSelect.selectedOptions).map(opt => opt.value);
        }

        // URL Persistence
        function updateUrl() {
            const params = new URLSearchParams();
            const selected = getSelectedMetrics();
            if (selected.length > 0) params.set('metric', selected.join(','));
            params.set('type', typeSelect.value);
            if (startInput.value) params.set('start', startInput.value);
            if (endInput.value) params.set('end', endInput.value);
            window.history.replaceState({}, '', `${window.location.pathname}?${params.toString()}`);
        }

        function loadFromUrl() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('metric')) {
                const metrics = params.get('metric').split(',');
                Array.from(metricSelect.options).forEach(opt => {
                    opt.selected = metrics.includes(opt.value);
                });
            }
            if (params.has('type')) typeSelect.value = params.get('type');
            if (params.has('start')) startInput.value = params.get('start');
            if (params.has('end')) endInput.value = params.get('end');
        }

        async function fetchHistory() {
            const metrics = getSelectedMetrics();
            if (metrics.length === 0) return null;

            let start = startInput.value;
            let end = endInput.value;

            // Convert local time to UTC for backend if provided
            const toBackendTs = (val) => {
                if (!val) return null;
                const d = new Date(val);
                if (isNaN(d.getTime())) return null;
                return d.toISOString().replace('T', ' ').substring(0, 19);
            };

            const startTs = toBackendTs(start);
            const endTs = toBackendTs(end);

            loadingOverlay.style.display = 'flex';
            try {
                const results = {};
                await Promise.all(metrics.map(async (metric) => {
                    let url = `/api/data/${metric}/history?limit=5000`;
                    if (startTs) url += `&start=${encodeURIComponent(startTs)}`;
                    if (endTs) url += `&end=${encodeURIComponent(endTs)}`;

                    const response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        results[metric] = Array.isArray(data) ? data.reverse() : [];
                    }
                }));
                return results;
            } catch (e) {
                console.error("Fetch error:", e);
                return null;
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        function renderChart(results) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const type = typeSelect.value;
            const metrics = Object.keys(results);
            if (metrics.length === 0) return;

            // Simple approach: Use labels from the first metric that has data
            // In this system, timestamps usually align as they are recorded together
            let labels = [];
            for (const m of metrics) {
                if (results[m].length > 0) {
                    labels = results[m].map(d => {
                        const dt = new Date(d[0].replace(' ', 'T') + 'Z');
                        return dt.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    });
                    break;
                }
            }

            if (chartInstance) chartInstance.destroy();

            const chartType = type === 'bar' ? 'bar' : 'line';
            const isArea = type === 'area';
            const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim();
            const colors = ['#3498db', '#e67e22', '#2ecc71', '#e74c3c', '#9b59b6'];

            const datasets = metrics.map((metric, index) => {
                const color = colors[index % colors.length];
                return {
                    label: metric,
                    data: results[metric].map(d => d[1]),
                    borderColor: color,
                    backgroundColor: isArea ? color + '33' : color,
                    fill: isArea,
                    tension: 0.2,
                    pointRadius: results[metric].length > 100 ? 0 : 3,
                    pointHoverRadius: 5,
                    yAxisID: index === 0 ? 'y' : 'y1'
                };
            });

            const options = {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                scales: {
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        beginAtZero: false,
                        ticks: { color: textColor },
                        title: {
                            display: true,
                            text: metrics[0],
                            color: textColor
                        }
                    },
                    x: {
                        ticks: {
                            color: textColor,
                            maxRotation: 45,
                            minRotation: 0,
                            autoSkip: true,
                            maxTicksLimit: 10
                        }
                    }
                },
                plugins: {
                    legend: { labels: { color: textColor } },
                    tooltip: { enabled: true }
                }
            };

            if (metrics.length > 1) {
                options.scales.y1 = {
                    type: 'linear',
                    display: true,
                    position: 'right',
                    beginAtZero: false,
                    ticks: { color: textColor },
                    grid: { drawOnChartArea: false },
                    title: {
                        display: true,
                        text: metrics.slice(1).join(', '),
                        color: textColor
                    }
                };
            }

            chartInstance = new Chart(ctx, {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: options
            });
        }

        async function updateChart() {
            updateUrl();
            const results = await fetchHistory();
            if (results) {
                renderChart(results);
            }
        }

        refreshBtn.onclick = updateChart;
        metricSelect.onchange = updateChart;
        typeSelect.onchange = updateChart;

        async function init() {
            // Default time range: last 24h
            const now = new Date();
            const yesterday = new Date(now.getTime() - (24 * 60 * 60 * 1000));

            const pad = (n) => n.toString().padStart(2, '0');
            const toInputVal = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;

            startInput.value = toInputVal(yesterday);
            endInput.value = toInputVal(now);

            try {
                const res = await fetch('/api/keys');
                const keys = await res.json();
                if (keys.length === 0) {
                    const opt = document.createElement('option');
                    opt.textContent = "No metrics available";
                    metricSelect.appendChild(opt);
                }
                keys.sort().forEach(k => {
                    const opt = document.createElement('option');
                    opt.value = k;
                    opt.textContent = k;
                    metricSelect.appendChild(opt);
                });

                loadFromUrl();
                updateChart();
            } catch (e) {
                console.error("Init error:", e);
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }

        init();
    </script>
</body>
</html>
