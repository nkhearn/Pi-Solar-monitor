<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333333;
            --header-text: #2c3e50;
            --card-shadow: rgba(0,0,0,0.1);
            --card-title: #666666;
            --accent-color: #3498db;
            --border-color: #dddddd;
            --modal-bg: rgba(0,0,0,0.5);
            --gauge-bg: #ecf0f1;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --header-text: #ffffff;
            --card-shadow: rgba(0,0,0,0.3);
            --card-title: #aaaaaa;
            --accent-color: #3498db;
            --border-color: #444444;
            --modal-bg: rgba(255,255,255,0.1);
            --gauge-bg: #444444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 { margin: 0; color: var(--header-text); }
        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .status {
            font-size: 0.9em;
            padding: 5px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .connected {
            background-color: #d4edda;
            color: #155724;
        }
        .connected::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #28a745;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .disconnected { background-color: #f8d7da; color: #721c24; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(40, 167, 69, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }

        .btn {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--container-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 0.9em;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn:hover {
            background: var(--border-color);
        }
        .btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
        }
        .btn-danger {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 4px 8px;
            font-size: 0.8em;
        }
        .btn-small {
            padding: 4px 8px;
            font-size: 0.8em;
        }

        .section-title {
            margin: 20px 0 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--accent-color);
            font-size: 1.2em;
            color: var(--header-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--container-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 4px var(--card-shadow);
            border: 1px solid var(--border-color);
            position: relative;
            transition: all 0.2s;
        }
        .card.collapsed {
            padding: 4px 15px;
            min-height: 2px;
        }
        .card.collapsed h3, .card.collapsed .value {
            display: none;
        }
        .card.collapsed::after {
            content: "";
            display: block;
            height: 2px;
            width: 100%;
            background: var(--accent-color);
            opacity: 0.5;
        }
        .card h3 {
            margin-top: 0;
            font-size: 0.8em;
            color: var(--card-title);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--header-text);
            word-break: break-all;
        }
        .card .timestamp {
            font-size: 0.7em;
            color: #888;
            margin-top: 4px;
        }
        .edit-metric-btn {
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
            font-size: 1.2em;
        }
        .card:hover .edit-metric-btn {
            opacity: 1;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .chart-container {
            background: var(--container-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 4px var(--card-shadow);
            border: 1px solid var(--border-color);
            min-height: 250px;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .chart-title {
            font-weight: bold;
            color: var(--header-text);
        }
        .chart-actions {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .chart-body {
            flex-grow: 1;
            position: relative;
        }

        .gauge-value {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
            font-weight: bold;
            color: var(--header-text);
        }

        /* Responsive Adjustments */
        @media (max-width: 600px) {
            body { padding: 12px; }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                margin-bottom: 15px;
            }
            .controls {
                flex-wrap: wrap;
                width: 100%;
                gap: 6px;
            }
            .controls .btn {
                flex: 1 1 auto;
                justify-content: center;
            }
            .btn {
                padding: 8px 6px;
                font-size: 0.8em;
            }
            .status {
                width: 100%;
                justify-content: center;
                box-sizing: border-box;
            }
            h1 { font-size: 1.6em; }
            .grid { gap: 12px; }
            .chart-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .chart-container { padding: 12px; }
            .chart-header { flex-direction: column; align-items: flex-start; }
            .chart-actions { width: 100%; justify-content: space-between; }
            .chart-actions .btn { flex: 0 1 auto; }
            .modal-content { width: 95%; box-sizing: border-box; padding: 15px; }
            .vm-item { padding: 10px 0; }
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #customizeMetricModal {
            z-index: 1100;
        }
        .modal-content {
            background: var(--container-bg);
            padding: 24px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
        }
        .modal-header {
            font-size: 1.2em;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        .form-group select, .form-group input:not([type="checkbox"]):not([type="color"]) {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
        }
        .form-group input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            cursor: pointer;
        }
        .form-group input[type="color"] {
            height: 40px;
            padding: 2px;
            cursor: pointer;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
        }
        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .hidden { display: none; }

        #virtual-metrics-list {
            margin-bottom: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .vm-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            gap: 10px;
        }
        .vm-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Solar Monitor</h1>
            <div class="controls">
                <button id="customizeBtn" class="btn">⚙️ Customize</button>
                <button id="manageVMBtn" class="btn">🧮 Virtual Metrics</button>
                <button id="themeToggle" class="btn" aria-label="Toggle dark mode">🌙 Dark Mode</button>
                <div id="status" class="status disconnected" aria-live="polite">Connecting...</div>
            </div>
        </header>

        <div id="metrics-sections">
            <div id="section-solar" class="hidden">
                <div class="section-title">Solar</div>
                <div class="grid" id="metrics-solar"></div>
            </div>
            <div id="section-battery" class="hidden">
                <div class="section-title">Battery</div>
                <div class="grid" id="metrics-battery"></div>
            </div>
            <div id="section-temp" class="hidden">
                <div class="section-title">Temperature</div>
                <div class="grid" id="metrics-temp"></div>
            </div>
            <div id="section-virtual" class="hidden">
                <div class="section-title">Virtual Metrics</div>
                <div class="grid" id="metrics-virtual"></div>
            </div>
            <div id="section-other" class="hidden">
                <div class="section-title">Other</div>
                <div class="grid" id="metrics-other"></div>
            </div>
        </div>

        <div class="section-title">
            Charts
            <button id="addChartBtn" class="btn btn-primary" aria-label="Add new chart">➕ Add Chart</button>
        </div>
        <div class="chart-grid" id="charts-container">
            <!-- Charts injected here -->
        </div>
    </div>

    <!-- Add Chart Modal -->
    <div id="addChartModal" class="modal hidden" role="dialog" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div id="modalTitle" class="modal-header">Add New Chart</div>
            <div class="form-group">
                <label for="chartTitle">Title</label>
                <input type="text" id="chartTitle" placeholder="My Chart">
            </div>
            <div class="form-group">
                <label for="chartMetric">Metric</label>
                <select id="chartMetric"></select>
            </div>
            <div class="form-group">
                <label for="chartType">Chart Type</label>
                <select id="chartType">
                    <option value="line">Line Chart</option>
                    <option value="gauge">Gauge (Latest Value)</option>
                </select>
            </div>
            <div class="form-group" id="maxValGroup">
                <label for="chartMax">Max Value (for Gauge)</label>
                <input type="number" id="chartMax" value="1000">
            </div>
            <div class="modal-actions">
                <button id="cancelChartBtn" class="btn">Cancel</button>
                <button id="saveChartBtn" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Customize Metric Modal -->
    <div id="customizeMetricModal" class="modal hidden" role="dialog" aria-labelledby="cmModalTitle">
        <div class="modal-content">
            <div id="cmModalTitle" class="modal-header">Customize Metric</div>
            <input type="hidden" id="cmKey">
            <div class="form-group">
                <label for="cmDisplayName">Display Name</label>
                <input type="text" id="cmDisplayName" placeholder="Metric Name">
            </div>
            <div class="form-group">
                <label for="cmColor">Color</label>
                <input type="color" id="cmColor" value="#3498db">
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="cmHidden">
                <label for="cmHidden">Hide Metric (collapse)</label>
            </div>
            <div class="form-group">
                <label for="cmOrder">Order (lower = first)</label>
                <input type="number" id="cmOrder" value="0">
            </div>
            <div class="modal-actions">
                <button id="cancelCMBtn" class="btn">Cancel</button>
                <button id="saveCMBtn" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Customize Dashboard Modal -->
    <div id="customizeDashboardModal" class="modal hidden" role="dialog" aria-labelledby="cdModalTitle">
        <div class="modal-content" style="width: 600px; max-height: 85vh; display: flex; flex-direction: column;">
            <div id="cdModalTitle" class="modal-header">Customize Dashboard Metrics</div>
            <div id="metric-configs-list" style="flex-grow: 1; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;">
                <!-- Metrics and their basic config here -->
            </div>
            <div class="modal-actions">
                <button id="closeCDBtn" class="btn">Close</button>
            </div>
        </div>
    </div>

    <!-- Manage Virtual Metrics Modal -->
    <div id="manageVMModal" class="modal hidden" role="dialog" aria-labelledby="vmModalTitle">
        <div class="modal-content">
            <div id="vmModalTitle" class="modal-header">Manage Virtual Metrics</div>
            <div id="virtual-metrics-list"></div>
            <hr>
            <div class="modal-header">Add New Virtual Metric</div>
            <div class="form-group">
                <label for="vmName">Name</label>
                <input type="text" id="vmName" placeholder="total_efficiency">
            </div>
            <div class="form-group">
                <label for="vmFormula">Formula (e.g. (pv_power + battery_power) / load)</label>
                <input type="text" id="vmFormula" placeholder="(metric1 + metric2) / metric3">
            </div>
            <div class="modal-actions">
                <button id="closeVMBtn" class="btn">Close</button>
                <button id="saveVMBtn" class="btn btn-primary">Add</button>
            </div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const themeToggle = document.getElementById('themeToggle');
        const chartsContainer = document.getElementById('charts-container');
        const addChartModal = document.getElementById('addChartModal');
        const chartMetricSelect = document.getElementById('chartMetric');
        const chartTypeSelect = document.getElementById('chartType');
        const maxValGroup = document.getElementById('maxValGroup');

        const manageVMModal = document.getElementById('manageVMModal');
        const vmListEl = document.getElementById('virtual-metrics-list');

        const COLORS = [
            '#3498db', '#e67e22', '#2ecc71', '#9b59b6', '#f1c40f',
            '#e74c3c', '#1abc9c', '#34495e', '#d35400', '#27ae60'
        ];

        let charts = [];
        let availableMetrics = [];
        let lastData = null;
        let lastPayload = null;
        let virtualMetrics = [];
        let metricConfigs = {};

        function formatTimestamp(ts) {
            if (!ts) return '';
            // Handle SQLite format YYYY-MM-DD HH:MM:SS.SSS
            // Ensure we handle it consistently as a local time or UTC as stored
            const parts = ts.split(' ');
            const dateParts = parts[0].split('-');
            const timeParts = parts[1].split(':');

            const dt = new Date(dateParts[0], dateParts[1] - 1, dateParts[2], timeParts[0], timeParts[1], timeParts[2].split('.')[0]);
            const now = new Date();

            const isToday = dt.getDate() === now.getDate() &&
                            dt.getMonth() === now.getMonth() &&
                            dt.getFullYear() === now.getFullYear();

            const pad = (n) => n.toString().padStart(2, '0');
            const hours = pad(dt.getHours());
            const minutes = pad(dt.getMinutes());

            if (isToday) {
                return `${hours}:${minutes}`;
            } else {
                const day = pad(dt.getDate());
                const month = pad(dt.getMonth() + 1);
                const year = dt.getFullYear().toString().slice(-2);
                return `${day}-${month}-${year} ${hours}:${minutes}`;
            }
        }

        chartTypeSelect.onchange = () => {
            maxValGroup.classList.toggle('hidden', chartTypeSelect.value !== 'gauge');
        };

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
            updateChartTheme();
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(savedTheme);

        function updateChartTheme() {
            const color = getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim();
            const gaugeBg = getComputedStyle(document.documentElement).getPropertyValue('--gauge-bg').trim();

            charts.forEach(c => {
                if (c.instance) {
                    if (c.type === 'line') {
                        c.instance.options.scales.y.ticks.color = color;
                        c.instance.options.scales.x.ticks.color = color;
                        c.instance.options.plugins.legend.labels.color = color;
                    } else if (c.type === 'gauge') {
                        c.instance.data.datasets[0].backgroundColor[1] = gaugeBg;
                    }
                    c.instance.update();
                }
            });
        }

        function updateStatus(connected) {
            statusEl.textContent = connected ? 'Live' : 'Disconnected';
            statusEl.className = 'status ' + (connected ? 'connected' : 'disconnected');
        }

        function getCategory(key) {
            if (virtualMetrics.some(vm => vm.name === key)) return 'virtual';
            key = key.toLowerCase();
            if (key.includes('solar') || key.includes('pv')) return 'solar';
            if (key.includes('battery') || key.includes('bus')) return 'battery';
            if (key.includes('temp') || key.includes('water') || key.includes('inlet') || key.includes('outlet')) return 'temp';
            return 'other';
        }

        function renderMetrics(payload) {
            lastPayload = payload;
            const data = payload.data;
            lastData = data;
            const categories = {
                solar: document.getElementById('metrics-solar'),
                battery: document.getElementById('metrics-battery'),
                temp: document.getElementById('metrics-temp'),
                virtual: document.getElementById('metrics-virtual'),
                other: document.getElementById('metrics-other')
            };

            const seenCategories = new Set();
            const allKeys = Object.keys(data).filter(k => typeof data[k] !== 'object' || data[k] === null);

            if (allKeys.length !== availableMetrics.length) {
                availableMetrics = allKeys.filter(k => typeof data[k] === 'number');
                updateMetricSelect();
                // Rebuild UI if keys changed
                Object.values(categories).forEach(el => el.innerHTML = '');
            }

            // Sort keys based on config order
            const sortedKeys = [...allKeys].sort((a, b) => {
                const orderA = metricConfigs[a]?.order ?? 0;
                const orderB = metricConfigs[b]?.order ?? 0;
                if (orderA !== orderB) return orderA - orderB;
                return a.localeCompare(b);
            });

            for (const key of sortedKeys) {
                const category = getCategory(key);
                seenCategories.add(category);

                let card = document.getElementById(`metric-card-${key}`);
                let valueDiv;
                let titleEl;

                const config = metricConfigs[key] || {};

                if (!card) {
                    card = document.createElement('div');
                    card.className = 'card';
                    card.id = `metric-card-${key}`;

                    titleEl = document.createElement('h3');
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'metric-name';
                    titleEl.appendChild(nameSpan);

                    const editBtn = document.createElement('span');
                    editBtn.className = 'edit-metric-btn';
                    editBtn.innerHTML = '⚙️';
                    editBtn.onclick = (e) => { e.stopPropagation(); openCustomizeMetric(key); };
                    titleEl.appendChild(editBtn);

                    valueDiv = document.createElement('div');
                    valueDiv.className = 'value';
                    valueDiv.id = `metric-value-${key}`;

                    const unit = document.createElement('span');
                    unit.className = 'unit';
                    valueDiv.appendChild(unit);

                    const tsDiv = document.createElement('div');
                    tsDiv.className = 'timestamp';
                    tsDiv.id = `metric-ts-${key}`;

                    card.appendChild(titleEl);
                    card.appendChild(valueDiv);
                    card.appendChild(tsDiv);
                    categories[category].appendChild(card);
                } else {
                    valueDiv = document.getElementById(`metric-value-${key}`);
                    titleEl = card.querySelector('h3');
                }

                // Apply config
                const nameSpan = titleEl.querySelector('.metric-name');
                nameSpan.textContent = config.displayName || key.replace(/_/g, ' ');
                card.style.borderTop = `4px solid ${config.color || 'transparent'}`;
                card.classList.toggle('collapsed', !!config.hidden);

                const displayValue = typeof data[key] === 'number' ? data[key].toFixed(2).replace(/\.00$/, '') : data[key];
                if (valueDiv.childNodes[0].textContent !== displayValue) {
                    valueDiv.childNodes[0].textContent = displayValue;
                }

                const tsDiv = document.getElementById(`metric-ts-${key}`);
                if (tsDiv) {
                    const formattedTs = formatTimestamp(payload.timestamp);
                    if (tsDiv.textContent !== formattedTs) {
                        tsDiv.textContent = formattedTs;
                    }
                }
            }

            Object.keys(categories).forEach(cat => {
                const section = document.getElementById(`section-${cat}`);
                if (seenCategories.has(cat)) section.classList.remove('hidden');
                else section.classList.add('hidden');
            });

            charts.forEach(c => {
                if (c.type === 'gauge' && c.instance) {
                    const val = data[c.metric];
                    if (val !== undefined) {
                        const max = c.max || 1000;
                        c.instance.data.datasets[0].data = [val, Math.max(0, max - val)];
                        const valEl = document.querySelector(`#chart-wrapper-${c.id} .gauge-value`);
                        if (valEl) valEl.textContent = typeof val === 'number' ? val.toFixed(2).replace(/\.00$/, '') : val;
                        c.instance.update('none');
                    }
                }
            });
        }

        function updateMetricSelect() {
            const currentVal = chartMetricSelect.value;
            chartMetricSelect.innerHTML = '';
            availableMetrics.sort().forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                chartMetricSelect.appendChild(opt);
            });
            if (availableMetrics.includes(currentVal)) {
                chartMetricSelect.value = currentVal;
            }
        }

        async function saveCharts() {
            const config = charts.map(c => ({ id: c.id, title: c.title, type: c.type, metric: c.metric, max: c.max, range: c.range }));
            await fetch('/api/charts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
        }

        async function fetchHistory(metric, range) {
            let limit = 120; // 1h
            if (range === '24h') limit = 1500;
            if (range === '7d') limit = 11000;

            const response = await fetch(`/api/data/${metric}/history?start=${range}&limit=${limit}`);
            const data = await response.json();
            return data.reverse();
        }

        async function updateChartRange(chartId, range) {
            const chartConfig = charts.find(c => c.id === chartId);
            if (!chartConfig || chartConfig.type !== 'line') return;

            chartConfig.range = range;
            saveCharts();

            const buttons = document.querySelectorAll(`#chart-wrapper-${chartId} .range-btn`);
            buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.range === range));

            const data = await fetchHistory(chartConfig.metric, range);
            if (chartConfig.instance) {
                chartConfig.instance.data.labels = data.map(d => {
                    const ts = d[0].split(' ')[1].split(':');
                    return range === '1h' ? `${ts[0]}:${ts[1]}:${ts[2].split('.')[0]}` : `${ts[0]}:${ts[1]}`;
                });
                chartConfig.instance.data.datasets[0].data = data.map(d => d[1]);
                chartConfig.instance.update();
            }
        }

        function createChartUI(chartConfig) {
            const wrapper = document.createElement('div');
            wrapper.className = 'chart-container';
            wrapper.id = `chart-wrapper-${chartConfig.id}`;

            const header = document.createElement('div');
            header.className = 'chart-header';

            const title = document.createElement('div');
            title.className = 'chart-title';
            title.textContent = chartConfig.title;
            header.appendChild(title);

            const actions = document.createElement('div');
            actions.className = 'chart-actions';

            if (chartConfig.type === 'line') {
                ['1h', '24h', '7d'].forEach(r => {
                    const btn = document.createElement('button');
                    btn.className = `btn btn-small range-btn ${chartConfig.range === r ? 'active' : ''}`;
                    btn.dataset.range = r;
                    btn.textContent = r;
                    btn.onclick = () => updateChartRange(chartConfig.id, r);
                    actions.appendChild(btn);
                });
            }

            const removeBtn = document.createElement('button');
            removeBtn.className = 'btn btn-danger btn-small';
            removeBtn.textContent = 'Remove';
            removeBtn.onclick = () => removeChart(chartConfig.id);
            actions.appendChild(removeBtn);

            header.appendChild(actions);
            wrapper.appendChild(header);

            const body = document.createElement('div');
            body.className = 'chart-body';

            const canvas = document.createElement('canvas');
            canvas.id = `canvas-${chartConfig.id}`;
            body.appendChild(canvas);

            if (chartConfig.type === 'gauge') {
                const gVal = document.createElement('div');
                gVal.className = 'gauge-value';
                gVal.textContent = '0';
                body.appendChild(gVal);
            }

            wrapper.appendChild(body);
            chartsContainer.appendChild(wrapper);

            const ctx = canvas.getContext('2d');
            let instance;
            const color = COLORS[charts.indexOf(chartConfig) % COLORS.length];

            if (chartConfig.type === 'line') {
                instance = new Chart(ctx, {
                    type: 'line',
                    data: { labels: [], datasets: [{
                        label: chartConfig.metric,
                        data: [],
                        borderColor: color,
                        backgroundColor: color + '22',
                        tension: 0.3,
                        fill: true,
                        pointRadius: chartConfig.range === '1h' ? 3 : 0
                    }] },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim() } } },
                        scales: {
                            y: { ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim() } },
                            x: { ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim() } }
                        }
                    }
                });
                updateChartRange(chartConfig.id, chartConfig.range || '1h');
            } else {
                const gaugeBg = getComputedStyle(document.documentElement).getPropertyValue('--gauge-bg').trim();
                instance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        datasets: [{
                            data: [0, chartConfig.max || 1000],
                            backgroundColor: [color, gaugeBg],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        rotation: -90,
                        circumference: 180,
                        cutout: '80%',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false }, tooltip: { enabled: false } }
                    }
                });
            }
            chartConfig.instance = instance;
        }

        async function removeChart(id) {
            charts = charts.filter(c => c.id !== id);
            const el = document.getElementById(`chart-wrapper-${id}`);
            if (el) el.remove();
            await saveCharts();
        }

        document.getElementById('addChartBtn').onclick = () => {
            document.getElementById('chartTitle').value = '';
            addChartModal.classList.remove('hidden');
        };
        document.getElementById('cancelChartBtn').onclick = () => addChartModal.classList.add('hidden');
        document.getElementById('saveChartBtn').onclick = async () => {
            const config = {
                id: Date.now().toString(),
                title: document.getElementById('chartTitle').value || document.getElementById('chartMetric').value,
                metric: chartMetricSelect.value,
                type: document.getElementById('chartType').value,
                max: parseFloat(document.getElementById('chartMax').value) || 1000,
                range: '1h'
            };
            charts.push(config);
            createChartUI(config);
            await saveCharts();
            addChartModal.classList.add('hidden');
        };

        // Virtual Metrics Management
        document.getElementById('manageVMBtn').onclick = () => {
            refreshVMList();
            manageVMModal.classList.remove('hidden');
        };
        document.getElementById('closeVMBtn').onclick = () => manageVMModal.classList.add('hidden');

        async function refreshVMList() {
            const res = await fetch('/api/virtual_metrics');
            virtualMetrics = await res.json();
            vmListEl.innerHTML = '';
            virtualMetrics.forEach(vm => {
                const div = document.createElement('div');
                div.className = 'vm-item';
                div.innerHTML = `
                    <span><strong>${vm.name}</strong>: ${vm.formula}</span>
                    <button class="btn btn-danger btn-small" onclick="deleteVM('${vm.name}')">Delete</button>
                `;
                vmListEl.appendChild(div);
            });

            // Also refresh available metrics in case any were added/removed
            const keysRes = await fetch('/api/keys');
            availableMetrics = await keysRes.json();
            updateMetricSelect();
        }

        async function deleteVM(name) {
            await fetch(`/api/virtual_metrics/${name}`, { method: 'DELETE' });
            refreshVMList();
        }

        // Metric Customization
        const customizeMetricModal = document.getElementById('customizeMetricModal');
        const customizeDashboardModal = document.getElementById('customizeDashboardModal');
        const mcListEl = document.getElementById('metric-configs-list');

        document.getElementById('customizeBtn').onclick = () => {
            refreshMetricConfigsList();
            customizeDashboardModal.classList.remove('hidden');
        };
        document.getElementById('closeCDBtn').onclick = () => customizeDashboardModal.classList.add('hidden');

        function openCustomizeMetric(key) {
            const config = metricConfigs[key] || {};
            document.getElementById('cmKey').value = key;
            document.getElementById('cmDisplayName').value = config.displayName || '';
            document.getElementById('cmColor').value = config.color || '#3498db';
            document.getElementById('cmHidden').checked = !!config.hidden;
            document.getElementById('cmOrder').value = config.order ?? 0;
            customizeMetricModal.classList.remove('hidden');
        }

        document.getElementById('cancelCMBtn').onclick = () => customizeMetricModal.classList.add('hidden');
        document.getElementById('saveCMBtn').onclick = async () => {
            const key = document.getElementById('cmKey').value;
            const config = {
                displayName: document.getElementById('cmDisplayName').value,
                color: document.getElementById('cmColor').value,
                hidden: document.getElementById('cmHidden').checked,
                order: parseInt(document.getElementById('cmOrder').value) || 0
            };

            metricConfigs[key] = config;
            await fetch('/api/metric_configs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ [key]: config })
            });

            customizeMetricModal.classList.add('hidden');
            if (lastPayload) renderMetrics(lastPayload);
            refreshMetricConfigsList();
        };

        async function refreshMetricConfigsList() {
            mcListEl.innerHTML = '';
            let keysToConfig = [];
            if (lastData) {
                keysToConfig = Object.keys(lastData).filter(k => typeof lastData[k] !== 'object' || lastData[k] === null);
            } else {
                // If no data yet, show keys from configs if any
                keysToConfig = Object.keys(metricConfigs);
            }

            if (keysToConfig.length === 0) {
                mcListEl.innerHTML = '<div style="padding: 20px; text-align: center; opacity: 0.7;">No metrics available to customize yet.</div>';
                return;
            }

            const sortedKeys = keysToConfig.sort((a,b) => {
                const orderA = metricConfigs[a]?.order ?? 0;
                const orderB = metricConfigs[b]?.order ?? 0;
                if (orderA !== orderB) return orderA - orderB;
                return a.localeCompare(b);
            });

            sortedKeys.forEach(key => {
                const config = metricConfigs[key] || {};
                const div = document.createElement('div');
                div.className = 'vm-item';

                const content = document.createElement('div');
                content.style.display = 'flex';
                content.style.alignItems = 'flex-start';
                content.style.gap = '10px';
                content.style.flexGrow = '1';

                const indicator = document.createElement('div');
                indicator.style.width = '10px';
                indicator.style.minWidth = '10px';
                indicator.style.height = '1.2em';
                indicator.style.backgroundColor = config.color || '#ccc';
                indicator.style.borderRadius = '2px';
                indicator.style.marginTop = '2px';
                content.appendChild(indicator);

                const info = document.createElement('div');
                info.style.flexGrow = '1';

                const strong = document.createElement('strong');
                strong.textContent = config.displayName || key;
                info.appendChild(strong);

                info.appendChild(document.createTextNode(` (${key})`));
                info.appendChild(document.createElement('br'));

                const small = document.createElement('small');
                small.textContent = `Order: ${config.order ?? 0} | ${config.hidden ? 'Hidden' : 'Visible'}`;
                info.appendChild(small);

                content.appendChild(info);
                div.appendChild(content);

                const btn = document.createElement('button');
                btn.className = 'btn btn-small';
                btn.textContent = 'Edit';
                btn.onclick = () => openCustomizeMetric(key);
                div.appendChild(btn);

                mcListEl.appendChild(div);
            });
        }

        document.getElementById('saveVMBtn').onclick = async () => {
            const name = document.getElementById('vmName').value;
            const formula = document.getElementById('vmFormula').value;
            if (!name || !formula) return;

            const res = await fetch('/api/virtual_metrics', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, formula })
            });

            if (res.ok) {
                document.getElementById('vmName').value = '';
                document.getElementById('vmFormula').value = '';
                refreshVMList();
            } else {
                const err = await res.json();
                alert('Error: ' + err.detail);
            }
        };

        async function init() {
            const resConfigs = await fetch('/api/metric_configs');
            metricConfigs = await resConfigs.json();

            const resCharts = await fetch('/api/charts');
            let savedCharts = await resCharts.json();

            if (savedCharts.length === 0) {
                // Initial defaults if none in DB
                savedCharts = [
                    { id: 'default1', title: 'Solar Power', metric: 'solar_power', type: 'line', range: '1h' },
                    { id: 'default2', title: 'Battery', metric: 'battery_voltage', type: 'gauge', max: 15 }
                ];
                // Don't save defaults automatically to avoid clutter if they don't apply
            }

            charts = savedCharts;
            charts.forEach(c => createChartUI(c));

            const resVM = await fetch('/api/virtual_metrics');
            virtualMetrics = await resVM.json();

            fetch('/api/last')
                .then(res => res.json())
                .then(payload => { if (payload.data) renderMetrics(payload); });

            connectWebSocket();
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => updateStatus(true);
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'new_data') {
                    renderMetrics(msg.payload);
                    const timeStr = msg.payload.timestamp.split(' ')[1].split('.')[0];
                    charts.forEach(c => {
                        if (c.type === 'line' && c.instance && c.range === '1h') {
                            const val = msg.payload.data[c.metric];
                            if (val !== undefined) {
                                c.instance.data.labels.push(timeStr);
                                c.instance.data.datasets[0].data.push(val);
                                if (c.instance.data.labels.length > 60) {
                                    c.instance.data.labels.shift();
                                    c.instance.data.datasets[0].data.shift();
                                }
                                c.instance.update('none');
                            }
                        }
                    });
                }
            };
            ws.onclose = () => {
                updateStatus(false);
                setTimeout(connectWebSocket, 5000);
            };
        }

        init();
    </script>
</body>
</html>
